const orange = '#ff6b35';
const gold   = '#f7931e';
const pink   = '#e84393';
const blue   = '#0984e3';
const green  = '#00b894';
const purple = '#a29bfe';
const cyan   = '#00cec9';

function initChart(id) {
  return echarts.init(document.getElementById(id));
}

/* ---- 性别饼图 ---- */
(function(){
  const c = initChart('genderChart');
  c.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {d}%' },
    legend: { bottom: 10, textStyle: { color: '#aaa' } },
    color: [blue, pink],
    series: [{
      type: 'pie',
      radius: ['40%','70%'],
      center: ['50%','45%'],
      itemStyle: { borderRadius: 8, borderColor: 'rgba(0,0,0,0.3)', borderWidth: 2 },
      label: { color: '#ddd', fontSize: 13 },
      data: [
        { value: 62, name: '男性 62%' },
        { value: 38, name: '女性 38%' }
      ]
    }]
  });
  window.addEventListener('resize', ()=>c.resize());
})();

/* ---- 年龄环形图 ---- */
(function(){
  const c = initChart('ageChart');
  c.setOption({
    tooltip: { trigger: 'item', formatter: '{b}<br/>占比: {d}%' },
    legend: { bottom: 5, textStyle: { color: '#aaa', fontSize: 11 } },
    color: [cyan, orange, purple, green],
    series: [{
      type: 'pie',
      radius: ['35%','68%'],
      center: ['50%','45%'],
      roseType: 'radius',
      itemStyle: { borderRadius: 6, borderColor: 'rgba(0,0,0,0.3)', borderWidth: 2 },
      label: { color: '#ddd', fontSize: 12 },
      data: [
        { value: 28, name: '18-24岁 Z世代' },
        { value: 35, name: '25-34岁 核心群' },
        { value: 22, name: '35-44岁 家庭消费' },
        { value: 15, name: '45岁+ 实用型' }
      ]
    }]
  });
  window.addEventListener('resize', ()=>c.resize());
})();

/* ---- 城市等级 ---- */
(function(){
  const c = initChart('cityChart');

    tooltip: { trigger: 'item', formatter: '{b}<br/>占比: {d}%' },
    legend: { bottom: 10, textStyle: { color: '#aaa', fontSize: 11 } },
    color: [gold, orange, '#e17055', green],
    series: [{
      type: 'pie',
      radius: '65%',
      center: ['50%','45%'],
      itemStyle: { borderRadius: 6, borderColor: 'rgba(0,0,0,0.3)', borderWidth: 2 },

})();

/* ---- 月收入 ---- */
(function(){

      type: 'category',

    [7,0,30],[7,1,45],[7,2,25],[7,3,35],[7,4,70],[7,5,85],[7,6,60],[7,7,55]
  ];
  c.setOption({
    tooltip: {
      formatter: function(p) {
        return groups[p.data[1]] + ' × ' + categories[p.data[0]] + '<br/>偏好指数: ' + p.data[2];
      }
    },
    grid: { left: 90, right: 40, top: 30, bottom: 60 },
    xAxis: {
      type: 'category',
      data: categories,
      axisLabel: { color: '#aaa', fontSize: 11, rotate: 30 },
      axisLine: { lineStyle: { color: '#333' } },
      splitArea: { show: true, areaStyle: { color: ['rgba(255,255,255,0.02)','rgba(255,255,255,0.04)'] } }
    },
    yAxis: {
      type: 'category',
      data: groups,
      axisLabel: { color: '#aaa', fontSize: 11 },
      axisLine: { lineStyle: { color: '#333' } },
      splitArea: { show: true, areaStyle: { color: ['rgba(255,255,255,0.02)','rgba(255,255,255,0.04)'] } }

    visualMap: {
      min: 10, max: 90,

      orient: 'horizontal',

      bottom: 0,
      inRange: {
        color: ['#1a1a3e', '#2d1b69', '#6c3fa0', '#e84393', '#ff6b35', '#f7931e']

      textStyle: { color: '#aaa' }

    series: [{
      type: 'heatmap',
      data: data,
      label: { show: true, color: '#fff', fontSize: 11 },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
    }]
  });
  window.addEventListener('resize', ()=>c.resize());
})();

    yAxis: {
      type: 'value',
      axisLabel: { color: '#aaa', formatter: '{value}' },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } }
    },
    series: [
      {

        itemStyle: { color: orange, borderRadius: [4,4,0,0] }

      {
        name: '35-44岁', type: 'bar',
        data: [65, 60, 30, 40, 45, 80],
        itemStyle: { color: purple, borderRadius: [4,4,0,0] }
      },
      {
        name: '45岁+', type: 'bar',
        data: [60, 25, 20, 35, 25, 60],
        itemStyle: { color: green, borderRadius: [4,4,0,0] }
      }
    ]
  });

})();

/* ---- 折线图: 城市等级×消费能力 ---- */
(function(){
  const c = initChart('lineChart');

    tooltip: { trigger: 'axis' },

      data: ['一线城市', '二线城市', '三四线城市', '农村/县域'],
      textStyle: { color: '#aaa', fontSize: 11 },

    grid: { left: 60, right: 30, top: 50, bottom: 40 },
    xAxis: {
      type: 'category',
      data: ['3000元以下', '3000-5999元', '6000-9999元', '10000元以上'],
      axisLabel: { color: '#aaa', fontSize: 12 },
      axisLine: { lineStyle: { color: '#333' } }
    },
    yAxis: {
      type: 'value',
      name: '消费指数',
      nameTextStyle: { color: '#aaa' },
      axisLabel: { color: '#aaa' },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } }

    series: [
      {
        name: '一线城市', type: 'line', smooth: true,
        data: [15, 25, 40, 70],
        lineStyle: { width: 3, color: gold },
        itemStyle: { color: gold },

        itemStyle: { color: blue },

      },

})();

</script>
